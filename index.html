<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Ball Knowledge Trainer</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

.card{
    background:white;
    max-width:900px;
    margin:auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.mode-btn{
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:16px;
    cursor:pointer;
}

input{
    width:80%;
    padding:12px;
    font-size:18px;
    margin:10px;
}

button{
    padding:12px 18px;
    margin:5px;
    font-size:16px;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🏀 Elite Ball Knowledge Trainer</h1>

<h3>Select a Mode</h3>

<div id="modes"></div>

<hr>

<h2 id="question">Choose a mode to begin.</h2>

<input id="answer" placeholder="Type your answer">

<br>

<button onclick="checkAnswer()">Submit</button>
<button onclick="nextQuestion()">Skip</button>

<div id="feedback"></div>

<p>
Score: <span id="score">0</span>
|
Streak: <span id="streak">0</span>
</p>

<p>
Mode:
<span id="currentMode">None</span>
</p>

</div>

<script>

};

const modesDiv = document.getElementById("modes");

Object.keys(modes).forEach(mode => {

    const btn = document.createElement("button");

    btn.className = "mode-btn";

    btn.textContent = mode;

    btn.onclick = () => setMode(mode);

    modesDiv.appendChild(btn);

});

let currentData = null;
let years = [];
let currentYear = null;

let score = 0;
let streak = 0;

function setMode(mode){

    currentData = modes[mode];

    years = Object.keys(currentData);

    document.getElementById("currentMode").textContent = mode;

    nextQuestion();

}

function nextQuestion(){

    if(!currentData) return;

    currentYear =
        years[Math.floor(Math.random()*years.length)];

    document.getElementById("question").textContent =
        `Who won ${document.getElementById("currentMode").textContent} in ${currentYear}?`;

    document.getElementById("answer").value = "";

    document.getElementById("feedback").textContent = "";

}

function normalize(text){

    return text
        .toLowerCase()
        .replace(/[^a-z]/g,'');

}

function checkAnswer(){

    if(!currentData) return;

    const user =
        normalize(document.getElementById("answer").value);

    const correct =
        normalize(currentData[currentYear]);

    const feedback =
        document.getElementById("feedback");

    if(user === correct){

        score++;
        streak++;

        feedback.textContent = "✅ Correct!";
        feedback.className = "correct";

    } else {

        streak = 0;

        feedback.textContent =
            "❌ " + currentData[currentYear];

        feedback.className = "wrong";

    }

    document.getElementById("score").textContent =
        score;

    document.getElementById("streak").textContent =
        streak;

    setTimeout(nextQuestion, 1200);

}

document.getElementById("answer")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        checkAnswer();

    }

});

</script>

</body>
</html>
